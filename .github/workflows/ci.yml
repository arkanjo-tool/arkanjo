name: ci

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build and Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        build_type: [Release]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Install dependencies on Ubuntu
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-venv cmake build-essential
        python3 -m venv venv

    - name: Install dependencies on macOS
      if: matrix.os == 'macos-latest'
      run: |
        brew install python@3.11 cmake
        echo "/opt/homebrew/opt/python@3.11/bin" >> $GITHUB_PATH
        python3.11 -m venv venv

    - name: Install dependencies on Windows
      if: matrix.os == 'windows-latest'
      run: |
        choco install python cmake -y
        py -3 -m venv venv

    - name: Setup Python virtual environment
      run: |
        source venv/bin/activate || call venv\Scripts\activate
        python -m pip install --upgrade pip
        python -m pip install nltk gensim astor
        python -m nltk.downloader punkt
        python -m nltk.downloader punkt_tab

    - name: Configure CMake
      run: cmake -S . -B build -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} -DCMAKE_INSTALL_PREFIX=$HOME/.local

    - name: Build
      run: cmake --build build --config ${{ matrix.build_type }} --target install

    - name: Run E2E tests
      run: |
        source venv/bin/activate || call venv\Scripts\activate
        echo -e "tests/e2e/codebase\n0.9\n1" | arkanjo preprocessor
        arkanjo explorer
        arkanjo duplication

    - name: Upload build artifacts
      uses: actions/upload-artifact@v6
      with:
        name: arkanjo-cli-${{ matrix.os }}
        path: |
          build/arkanjo
          build/arkanjo-preprocessor